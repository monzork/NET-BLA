version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: task_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrongPassword123!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    container_name: task_api_container
    build:
      context: .
      dockerfile: src/API/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=TaskDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
      - Jwt__Secret=SuperSecretKeyForTaskManagementApplicationCleanArchitecture2026
      - Jwt__Issuer=TaskAppAPI
      - Jwt__Audience=TaskAppClient
